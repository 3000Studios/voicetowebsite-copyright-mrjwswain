version: 1

agents:
  - name: "VoiceToWebsite Workspace"
    description: "Repo-aware Continue agent with deploy-lock policy and local MCP tooling"
    rules:
      - ".continue/rules.md"
    commands:
      - "npm run verify"
      - "npm run ship"
      - "npm run ship:push"
      - "npm run deploy:live"
      - "npm run build"
      - "npm test"
