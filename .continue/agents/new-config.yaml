name: Workspace Autonomous Agent
version: 1.2.0
schema: v1

models:
  - name: local-fast-code
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434

  - name: local-chat
    provider: ollama
    model: llama3.2:3b
    apiBase: http://localhost:11434

  - name: local-deep-code
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434

  - name: openai-fallback
    provider: openai
    model: gpt-4o-mini
    apiKey: ${OPENAI_API}

agent:
  id: workspace-agent
  name: Workspace Autonomous Agent
  description: "VoiceToWebsite repo autopilot. Must follow verify -> ship -> push -> deploy:live."
  model: local-fast-code
  continuous: true
  maxIterations: 60
  confidenceThreshold: 0.1
  continueUntilObjectiveComplete: true
  autoFindAndFix: true
  autoCreateFiles: true
  autoFix: true
  autoHeal: true
  autoTest: true
  confirmationMode: never
  permissions:
    filesystem: true
    run: true
    network: true
    git: true
    allowFileCreate: true
    allowFileDelete: false
  workspaceRoots:
    - .
  envFiles: []
  concurrency: 4
  timeouts:
    modelCallSeconds: 180
    commandSeconds: 1800
  retryPolicy:
    retries: 4
    backoffSeconds: 5
    maxBackoffSeconds: 45
  allowedCommands:
    - pwsh
    - powershell
    - node
    - npm
    - npx
    - git
    - wrangler
    - npm run verify
    - npm run test
    - npm run build
    - npm run type-check
    - npm run types:check
    - npm run env:audit
    - npm run ship
    - npm run ship:push
    - npm run deploy:live
    - npm run dev
    - npm run dev:worker
    - npm run dev:all
    - npm run test:pages
  fallbackModels:
    - local-deep-code
    - openai-fallback
  preferLocalModels: true
  autoCommit: false
  autoDeploy: false
  logging:
    level: info
    persist: true
  telemetry: false
