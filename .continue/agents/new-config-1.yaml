name: VoiceToWebsite Fast Edit
version: 1.2.0
schema: v1

models:
  - name: local-fast-code
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434

  - name: local-chat
    provider: ollama
    model: llama3.2:3b
    apiBase: http://localhost:11434

  - name: openai-fallback
    provider: openai
    model: gpt-4o-mini
    apiKey: ${OPENAI_API}

agent:
  id: fast-edit
  name: VoiceToWebsite Fast Edit
  description: "Low-latency code and UI edits for daily work in this repo."
  model: local-fast-code
  continuous: false
  maxIterations: 12
  confidenceThreshold: 0.2
  continueUntilObjectiveComplete: false
  autoFindAndFix: true
  autoCreateFiles: true
  autoFix: true
  autoHeal: false
  autoTest: false
  confirmationMode: low
  permissions:
    filesystem: true
    run: true
    network: true
    git: false
    allowFileCreate: true
    allowFileDelete: false
  workspaceRoots:
    - .
  envFiles: []
  concurrency: 2
  timeouts:
    modelCallSeconds: 120
    commandSeconds: 900
  allowedCommands:
    - pwsh
    - powershell
    - node
    - npm
    - npx
    - npm run test
    - npm run build
    - npm run verify
  fallbackModels:
    - openai-fallback
  preferLocalModels: true
  autoCommit: false
  autoDeploy: false
  logging:
    level: info
    persist: true
  telemetry: false
