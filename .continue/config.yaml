name: voicetowebsite-continue
version: 1.3.0
schema: v1

# Free-first and fast:
# - Defaults are LOCAL (Ollama) to avoid paid tokens and rate limits.
# - Cloud models are included only as OPTIONAL fallbacks and are inert unless you set env keys.
#
# Required local default:
#   Ollama running at http://127.0.0.1:11434
#
# Recommended pulls:
#   ollama pull qwen2.5-coder:7b
#   ollama pull deepseek-coder:latest
#   ollama pull llama3.2:3b
#   ollama pull nomic-embed-text

models:
  # === PRIMARY (LOCAL / FREE) ===
  # Best balance of quality/speed for most repo work.
  - name: Qwen 2.5 Coder Local (Default)
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://127.0.0.1:11434
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  # Stronger local coder (often higher quality, can be slower).
  - name: DeepSeek Coder Local
    provider: ollama
    model: deepseek-coder:latest
    apiBase: http://127.0.0.1:11434
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  # Lightweight local general fallback (fast)
  - name: Llama 3.2 Local (Fast)
    provider: ollama
    model: llama3.2:3b
    apiBase: http://127.0.0.1:11434
    roles:
      - chat

  # === AUTOCOMPLETE (LOCAL / FREE) ===
  - name: Qwen 2.5 Coder Local Autocomplete
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://127.0.0.1:11434
    roles:
      - autocomplete

  - name: DeepSeek Coder Local Autocomplete
    provider: ollama
    model: deepseek-coder:latest
    apiBase: http://127.0.0.1:11434
    roles:
      - autocomplete

  # === EMBEDDINGS (LOCAL / FREE) ===
  # Keep codebase indexing fully free/offline.
  - name: Nomic Embed Local
    provider: ollama
    model: nomic-embed-text
    apiBase: http://127.0.0.1:11434
    roles:
      - embed

  # === OPTIONAL CLOUD FALLBACKS (ONLY USED IF YOU ADD KEYS) ===
  # If you want “free-tier” cloud speed boosts, set the keys in your environment.
  # Otherwise these do nothing.
  - name: Gemini 2.5 Flash
    provider: gemini
    model: gemini-2.5-flash
    apiKey: ${GEMINI_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  - name: Groq Llama 3.1 8B
    provider: openai
    model: llama-3.1-8b-instant
    apiBase: https://api.groq.com/openai/v1
    apiKey: ${GROQ_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  - name: Groq Autocomplete
    provider: openai
    model: llama-3.1-8b-instant
    apiBase: https://api.groq.com/openai/v1
    apiKey: ${GROQ_API_KEY}
    roles:
      - autocomplete

  - name: OpenRouter Free
    provider: openai
    model: qwen/qwen3-coder:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder

rules:
  - Prefer TypeScript-first solutions when adding new code.
  - Keep modules small, focused, and production-ready.
  - Never expose secrets; use environment variables for all API keys.
  - Respect the repository structure under dashboard, engine, scripts, workers, api, frontend, and server.

prompts:
  - name: Repo Review
    description: Review changes for bugs, regressions, and missing tests
    prompt: |
      Review the selected code or current diff like a senior engineer.
      Focus on bugs, behavioral regressions, security risks, performance pitfalls, and missing tests.
      Keep findings concise and actionable.
  - name: Build Feature
    description: Turn a request into an implementation plan and patch
    prompt: |
      Read the current repository context and implement the requested feature end to end.
      Keep the architecture modular, preserve existing routes, and explain assumptions briefly.

docs:
  - name: Continue Docs
    startUrl: https://docs.continue.dev/reference
  - name: React Docs
    startUrl: https://react.dev/
  - name: Vite Docs
    startUrl: https://vite.dev/guide/
