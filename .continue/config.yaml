name: VoiceToWebsite Workspace
version: 1.2.0
schema: v1

models:
  - name: local-fast-code
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434

  - name: local-chat
    provider: ollama
    model: llama3.2:3b
    apiBase: http://localhost:11434

  - name: local-deep-code
    provider: ollama
    model: qwen2.5-coder:14b
    apiBase: http://localhost:11434

  - name: local-embed
    provider: ollama
    model: nomic-embed-text
    apiBase: http://localhost:11434

  - name: openai-fallback
    provider: openai
    model: gpt-4o-mini
    apiKey: ${OPENAI_API}

chat:
  model: local-chat

autocomplete:
  model: local-fast-code

edit:
  model: local-fast-code

apply:
  model: local-fast-code

embed:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://localhost:11434

rerank:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://localhost:11434

agent:
  enabled: true
  maxIterations: 24
  temperature: 0.15
  model: local-fast-code
