name: voicetowebsite-continue
version: 1.2.0
schema: v1

# Free-first and reliable:
# 1) Ollama local models (fully free, works offline)
# 2) Optional free-tier cloud fallbacks (if keys exist)
#
# Required local default:
#   OLLAMA_API_URL=http://127.0.0.1:11434
#
# Helpful install/pull commands:
#   ollama pull deepseek-coder:latest
#   ollama pull llama3.2:3b
#   ollama pull nomic-embed-text

models:
  # Primary local coding model (best free default)
  - name: DeepSeek Coder Local
    provider: ollama
    model: deepseek-coder:latest
    apiBase: http://127.0.0.1:11434
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  # Lightweight local general fallback
  - name: Llama 3.2 Local
    provider: ollama
    model: llama3.2:3b
    apiBase: http://127.0.0.1:11434
    roles:
      - chat

  # Local autocomplete for speed and no API cost
  - name: DeepSeek Coder Local Autocomplete
    provider: ollama
    model: deepseek-coder:latest
    apiBase: http://127.0.0.1:11434
    roles:
      - autocomplete

  # Local embeddings keep codebase indexing fully free/offline
  - name: Nomic Embed Local
    provider: ollama
    model: nomic-embed-text
    apiBase: http://127.0.0.1:11434
    roles:
      - embed

  # Optional free-tier cloud fallbacks (safe to keep; only used if key exists)
  - name: Gemini 2.5 Flash
    provider: gemini
    model: gemini-2.5-flash
    apiKey: ${GEMINI_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  - name: Groq Llama 3.1 8B
    provider: openai
    model: llama-3.1-8b-instant
    apiBase: https://api.groq.com/openai/v1
    apiKey: ${GROQ_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat
      - edit
      - apply

  - name: Groq Autocomplete
    provider: openai
    model: llama-3.1-8b-instant
    apiBase: https://api.groq.com/openai/v1
    apiKey: ${GROQ_API_KEY}
    roles:
      - autocomplete

  - name: OpenRouter Free
    provider: openai
    model: qwen/qwen3-coder:free
    apiBase: https://openrouter.ai/api/v1
    apiKey: ${OPENROUTER_API_KEY}
    capabilities:
      - tool_use
    roles:
      - chat

context:
  - provider: file
  - provider: code
  - provider: diff
  - provider: terminal
  - provider: problems
  - provider: folder

rules:
  - Prefer TypeScript-first solutions when adding new code.
  - Keep modules small, focused, and production-ready.
  - Never expose secrets; use environment variables for all API keys.
  - Respect the repository structure under dashboard, engine, scripts, workers, api, frontend, and server.

prompts:
  - name: Repo Review
    description: Review changes for bugs, regressions, and missing tests
    prompt: |
      Review the selected code or current diff like a senior engineer.
      Focus on bugs, behavioral regressions, security risks, performance pitfalls, and missing tests.
      Keep findings concise and actionable.
  - name: Build Feature
    description: Turn a request into an implementation plan and patch
    prompt: |
      Read the current repository context and implement the requested feature end to end.
      Keep the architecture modular, preserve existing routes, and explain assumptions briefly.

docs:
  - name: Continue Docs
    startUrl: https://docs.continue.dev/reference
  - name: React Docs
    startUrl: https://react.dev/
  - name: Vite Docs
    startUrl: https://vite.dev/guide/
