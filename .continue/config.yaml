models:
  # Free-first local profile (Ollama)
  - title: Qwen2.5 Coder 7B (Local Free)
    provider: ollama
    model: qwen2.5-coder:7b
    apiBase: http://localhost:11434

  - title: Llama 3.2 3B (Local Free Chat)
    provider: ollama
    model: llama3.2:3b
    apiBase: http://localhost:11434

  - title: Nomic Embed (Local Free)
    provider: ollama
    model: nomic-embed-text
    apiBase: http://localhost:11434

  # Optional BYO-API profile (enable in Continue UI if you add keys)
  - title: OpenAI GPT-4o Mini (BYO API)
    provider: openai
    model: gpt-4o-mini
    apiKey: ${OPENAI_API}

chat:
  model: Llama 3.2 3B (Local Free Chat)

autocomplete:
  model: Qwen2.5 Coder 7B (Local Free)

edit:
  model: Qwen2.5 Coder 7B (Local Free)

apply:
  model: Qwen2.5 Coder 7B (Local Free)

embed:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://localhost:11434

rerank:
  provider: ollama
  model: nomic-embed-text
  apiBase: http://localhost:11434

agent:
  enabled: true
  maxIterations: 8
  temperature: 0.2
  model: Qwen2.5 Coder 7B (Local Free)
