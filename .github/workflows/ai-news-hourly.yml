name: AI News Hourly

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate story
        run: node scripts/ai-news-generate.mjs

      - name: Commit + push if changed
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "3000Studios Bot"
          git config user.email "bot@3000studios.local"
          git add -A
          git commit -m "AI News: hourly story"
          git push origin main

