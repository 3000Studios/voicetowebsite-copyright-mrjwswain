name: Deploy to Cloudflare Pages

# GLOBAL DEPLOYMENT RULE
# - Single repo, single branch (main), single Cloudflare Pages project.
# - Every push to main deploys to production.
# - Production domains (voicetowebsite.com, www.voicetowebsite.com) are bound
#   in the Cloudflare dashboard for the "voicetowebsite" Pages project.

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy with Wrangler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy with Wrangler
        run: npx wrangler pages deploy dist --project-name voicetowebsite --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
