name: Deploy to Cloudflare Pages

# DISABLED 2026-05-15.
# Cloudflare Pages' native Git integration is the deploy path now — Cloudflare
# builds on each push to main directly, so this workflow is redundant. It was
# also blocked by a GitHub Actions billing lock on the org account.
#
# To re-enable: restore the `push` trigger below and resolve GH Actions billing.
# Make sure to disable the Cloudflare dashboard Git integration first so the
# two paths don't double-deploy.

on:
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy with Wrangler
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy with Wrangler
        run: npx wrangler pages deploy dist --project-name voicetowebsite --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
