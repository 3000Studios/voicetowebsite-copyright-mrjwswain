name: Production Deploy to voicetowebsite.com

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PROJECT_NAME: "voicetowebsite"

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
          VITE_APP_URL: https://voicetowebsite.com
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages (Production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy to production - this should update voicetowebsite.com
          command: pages deploy dist --project-name=${{ env.PROJECT_NAME }} --branch=main

      - name: Verify Production Deployment
        run: |
          echo "Verifying production deployment..."
          sleep 15

          # Check if production URL is accessible
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://voicetowebsite.com || echo "000")
          echo "Production URL Status: $STATUS"

          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Production deployment verified!"
            echo "Site: https://voicetowebsite.com"
          else
            echo "⚠️ Could not verify production URL (Status: $STATUS)"
            echo "The deployment may still be propagating."
          fi

      - name: Create Deployment Summary
        run: |
          echo "## 🚀 Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Project:** voicetowebsite" >> $GITHUB_STEP_SUMMARY
          echo "**Production URL:** https://voicetowebsite.com" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** main" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
