# Production Deployment - Single Source of Truth
# - 1 Repo: voicetowebsite-copyright-mrjwswain
# - 1 Branch: main
# - 1 Target: Cloudflare Pages
# - 1 Domain: voicetowebsite.com

name: Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ADSENSE_PUBLISHER: ${{ secrets.VITE_ADSENSE_PUBLISHER }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=voicetowebsite --branch=main

      - name: Notify Deployment
        if: success()
        run: echo "✅ Deployed to https://voicetowebsite.com"
