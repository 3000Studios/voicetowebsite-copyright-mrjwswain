name: Auto Setup & Validation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  setup-and-validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
      continue-on-error: true
    
    - name: Run tests
      run: npm run test
      continue-on-error: true
    
    - name: Build project
      run: npm run build
    
    - name: Validate build output
      run: |
        if [ ! -d "dist" ]; then
          echo "Build failed - dist folder not found"
          exit 1
        fi
        echo "Build validated successfully"
    
    - name: Check environment variables
      run: |
        if [ -f ".env.local" ]; then
          echo "Environment file exists"
        else
          echo "Warning: .env.local not found"
        fi
    
    - name: Notify success
      if: success()
      run: echo "✅ Setup validation complete"
