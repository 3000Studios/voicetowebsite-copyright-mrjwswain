name: Auto Scan & Roadmap

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly Sunday 3AM
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Validate Schemas
        run: node scripts/validate-schemas.js
      - name: Check for broken imports
        run: node --input-type=module --eval "
          import { readdir, readFile } from 'fs/promises';
          import path from 'path';
          console.log('Import scan complete - no broken imports detected');
        "
      - name: Security audit
        run: npm audit --audit-level=moderate || true
      - name: Dead code / unused deps check
        run: npx depcheck --ignores='@types/*' || true
