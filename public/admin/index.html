<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin — VoiceToWebsite</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;margin:0;background:#0b1020;color:#e5e7eb}
      header{padding:18px 20px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.35);backdrop-filter:blur(12px)}
      h1{margin:0;font-size:18px;letter-spacing:.02em}
      main{max-width:1200px;margin:0 auto;padding:20px}
      .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:14px 0}
      input,select,button{border-radius:10px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:#e5e7eb;padding:10px 12px}
      button{cursor:pointer;background:#4f46e5;border-color:rgba(0,0,0,.2);font-weight:700}
      button.secondary{background:transparent}
      table{width:100%;border-collapse:collapse;margin-top:12px;overflow:hidden;border-radius:14px}
      th,td{padding:10px 10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:12px}
      th{font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:rgba(229,231,235,.7)}
      tr:hover td{background:rgba(255,255,255,.03)}
      .pill{display:inline-flex;align-items:center;border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:4px 10px;font-size:11px;gap:8px}
      .ok{border-color:rgba(46,232,154,.35);color:#2ee89a}
      .bad{border-color:rgba(240,74,74,.35);color:#f04a4a}
      .muted{color:rgba(229,231,235,.55)}
      code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    </style>
  </head>
  <body>
    <header>
      <h1>VoiceToWebsite — Admin</h1>
      <div class="muted" style="margin-top:6px">Protect this route with Cloudflare Access.</div>
    </header>
    <main>
      <div class="row">
        <select id="status">
          <option value="">All statuses</option>
          <option value="created">created</option>
          <option value="paid">paid</option>
          <option value="generating">generating</option>
          <option value="delivered">delivered</option>
          <option value="failed">failed</option>
        </select>
        <input id="limit" type="number" min="1" max="200" value="50" />
        <button id="refresh">Refresh</button>
        <span id="msg" class="muted"></span>
      </div>

      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Created</th>
            <th>Email</th>
            <th>Plan</th>
            <th>Cadence</th>
            <th>Launch</th>
            <th>Status</th>
            <th>Site</th>
            <th>Error</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </main>

    <script>
      const elRows = document.getElementById("rows");
      const elMsg = document.getElementById("msg");
      const elStatus = document.getElementById("status");
      const elLimit = document.getElementById("limit");

      function pill(text, cls) {
        return `<span class="pill ${cls || ""}">${text}</span>`;
      }

      async function load() {
        elMsg.textContent = "Loading…";
        const params = new URLSearchParams();
        const status = elStatus.value;
        const limit = String(Math.max(1, Math.min(200, Number(elLimit.value || "50"))));
        if (status) params.set("status", status);
        params.set("limit", limit);
        const res = await fetch(`/api/admin/orders?${params.toString()}`, { headers: { Accept: "application/json" } });
        const data = await res.json();
        const rows = data?.rows || [];
        elRows.innerHTML = rows
          .map((r) => {
            const st = String(r.status || "");
            const cls = st === "delivered" ? "ok" : st === "failed" ? "bad" : "";
            const site = r.site_url ? `<a href="${r.site_url}" target="_blank" rel="noreferrer"><code>open</code></a>` : "";
            const err = r.error ? `<span class="muted">${String(r.error).slice(0, 120)}</span>` : "";
            return `<tr>
              <td><code>${r.id}</code></td>
              <td class="muted">${r.created_at || ""}</td>
              <td>${r.email || ""}</td>
              <td>${r.plan || ""}</td>
              <td>${r.cadence || ""}</td>
              <td>${r.launch_discount ? "yes" : "no"}</td>
              <td>${pill(st, cls)}</td>
              <td>${site}</td>
              <td>${err}</td>
            </tr>`;
          })
          .join("");
        elMsg.textContent = `Loaded ${rows.length}`;
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
