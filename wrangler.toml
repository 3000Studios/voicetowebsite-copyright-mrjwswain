# VoiceToWebsite Worker — see https://developers.cloudflare.com/workers/best-practices/workers-best-practices/
# Keep compatibility_date current; re-run `npm run types` after changing bindings.
name = "voicetowebsite"
compatibility_date = "2026-03-02"
main = "worker.js"

compatibility_flags = ["nodejs_compat"]

# Static assets from Vite build output.
assets = { directory = "dist", binding = "ASSETS" }

# Explicitly disable workers.dev + preview URLs for production.
workers_dev = false
preview_urls = false

# Production routes for the public site.
routes = [
  { pattern = "voicetowebsite.com/*", zone_name = "voicetowebsite.com" },
  { pattern = "www.voicetowebsite.com/*", zone_name = "voicetowebsite.com" },
]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
# 0.01 = 1% of requests (cost-friendly); use 1 for full traces when debugging
head_sampling_rate = 0.01

[ai]
binding = "AI"

# Repo-managed safe runtime vars live here.
# Private Worker secrets stay in Cloudflare Dashboard → Worker → Settings → Variables and Secrets → Secrets.
# Manual Wrangler auth stays local in your PowerShell session as CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID.
