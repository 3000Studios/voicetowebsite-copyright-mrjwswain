name = "voicetowebsite"
main = "worker.js"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
OPENAI_MODEL = "gpt-4o-mini"
# Stripe secrets must be set with:
# wrangler secret put STRIPE_SECRET
# wrangler secret put STRIPE_WEBHOOK_SECRET
# GitHub secrets remain secret-backed:
# GITHUB_TOKEN
# GITHUB_REPO
# GITHUB_BASE_BRANCH

[[r2_buckets]]
binding = "DATA_BUCKET"
bucket_name = "voicetowebsite"
preview_bucket_name = "voicetowebsite"
