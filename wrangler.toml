# VoiceToWebsite Worker
# Docs: https://developers.cloudflare.com/workers/best-practices/workers-best-practices/
# After changing bindings, run: npm run types

name = "voicetowebsite"
compatibility_date = "2026-03-02"
main = "worker.js"
compatibility_flags = ["nodejs_compat"]

# No workers.dev or preview URLs in production.
workers_dev = false
preview_urls = false

# Production routes — must point to this Worker so ASSETS and all bindings apply.
routes = [
  { pattern = "voicetowebsite.com/*", zone_name = "voicetowebsite.com" },
  { pattern = "www.voicetowebsite.com/*", zone_name = "voicetowebsite.com" },
]

# -----------------------------------------------------------------------------
# Static assets (Vite build output). Worker runs first for every request so we
# can do auth, API routing, and HTML injection; then we delegate to ASSETS.
# SPA: unknown paths serve index.html so client-side routing works.
# -----------------------------------------------------------------------------
[assets]
directory = "dist"
binding = "ASSETS"
run_worker_first = true
not_found_handling = "single-page-application"

# -----------------------------------------------------------------------------
# Observability (logs + traces). Set observability.traces.head_sampling_rate
# to 1 when debugging; 0.01 keeps cost low in production.
# -----------------------------------------------------------------------------
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 0.01

# -----------------------------------------------------------------------------
# Workers AI
# -----------------------------------------------------------------------------
[ai]
binding = "AI"

# -----------------------------------------------------------------------------
# Runtime variables (safe to commit). Secrets go in Dashboard or wrangler secret put.
#
# Deploy sources and what they need:
# - CLI / IDE:  npm run deploy  (uses CLOUDFLARE_API_TOKEN / CLOUD_FLARE_API_TOKEN in env)
# - Dashboard: Deploy button triggers build; set CF_DEPLOY_HOOK_URL + CLOUD_FLARE_API_TOKEN as secrets
# - Command center / Custom GPT: same as dashboard; backend calls CF Builds API when deploy requested
# -----------------------------------------------------------------------------
[vars]
ENVIRONMENT = "production"
PUBLIC_GENERATE = "1"
