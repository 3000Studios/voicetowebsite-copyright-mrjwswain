<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoiceToWebsite - Phosphor Projection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Space+Mono&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      :root {
        --neon-pink: #ff00ff;
        --neon-cyan: #00ffff;
        --phosphor-green: #00ff66;
        --bg-dark: #050505;
        --crt-scanline: rgba(18, 16, 16, 0.1);
      }

      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: var(--bg-dark);
        overflow: hidden;
        font-family: "Syncopate", sans-serif;
        color: white;
        cursor: crosshair;
      }

      .crt-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(var(--crt-scanline) 50%, rgba(0, 0, 0, 0) 50%);
        background-size: 100% 4px;
        z-index: 1000;
        pointer-events: none;
        opacity: 0.2;
      }

      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1001;
        pointer-events: none;
        opacity: 0.05;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .nav-trigger {
        position: fixed;
        top: 40px;
        right: 40px;
        z-index: 2000;
        display: flex;
        align-items: center;
        gap: 20px;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .logo-text {
        font-size: 12px;
        letter-spacing: 4px;
        color: var(--neon-cyan);
        text-transform: uppercase;
        font-family: "Space Mono", monospace;
        text-shadow: 0 0 10px var(--neon-cyan);
        opacity: 0.8;
      }

      .burger-icon {
        width: 45px;
        height: 24px;
        position: relative;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .burger-line {
        width: 100%;
        height: 2px;
        background: var(--neon-pink);
        box-shadow: 0 0 15px var(--neon-pink);
        transition:
          0.5s transform,
          0.5s width;
      }

      .nav-trigger:hover .burger-line:nth-child(2) {
        width: 60%;
      }
      .nav-trigger:hover .logo-text {
        color: var(--neon-pink);
        text-shadow: 0 0 15px var(--neon-pink);
      }

      .nav-trigger.active .burger-line:nth-child(1) {
        transform: translateY(11px) rotate(45deg);
        width: 100%;
      }
      .nav-trigger.active .burger-line:nth-child(2) {
        opacity: 0;
      }
      .nav-trigger.active .burger-line:nth-child(3) {
        transform: translateY(-11px) rotate(-45deg);
        width: 100%;
      }

      .menu-box {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        clip-path: circle(0% at 90% 5%);
        transition: clip-path 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        z-index: 1500;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .menu-box.open {
        clip-path: circle(150% at 90% 5%);
      }

      #three-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      .nav-links {
        position: relative;
        z-index: 2;
        list-style: none;
        text-align: center;
        padding: 0;
      }

      .nav-item {
        margin: 40px 0;
        perspective: 1000px;
      }

      .nav-link {
        font-size: clamp(1.5rem, 5vw, 3rem);
        color: transparent;
        -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
        text-decoration: none;
        display: inline-block;
        transition:
          transform 0.4s ease,
          -webkit-text-stroke 0.4s ease;
        position: relative;
      }

      .nav-link::before {
        content: attr(data-text);
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        color: var(--neon-cyan);
        clip-path: inset(100% 0 0 0);
        transition: clip-path 0.4s ease;
        text-shadow: 0 0 20px var(--neon-cyan);
      }

      .nav-link:hover {
        transform: translateZ(100px) translateY(-20px);
        -webkit-text-stroke: 1px var(--neon-cyan);
      }

      .nav-link:hover::before {
        clip-path: inset(0 0 0 0);
      }

      .melting {
        animation: meltDown 1.5s forwards ease-in;
        filter: url(#melt-filter);
        pointer-events: none;
      }

      @keyframes meltDown {
        0% {
          transform: translateY(0) scaleY(1);
          opacity: 1;
        }
        100% {
          transform: translateY(200px) scaleY(2);
          opacity: 0;
        }
      }

      svg {
        position: absolute;
        width: 0;
        height: 0;
      }
    </style>
  </head>
  <body>
    <svg aria-hidden="true">
      <filter id="melt-filter">
        <feTurbulence type="fractalNoise" baseFrequency="0.01 0.1" numOctaves="2" result="noise" seed="1" />
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G" />
      </filter>
    </svg>

    <div class="crt-overlay" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <button
      type="button"
      class="nav-trigger"
      id="burger"
      aria-label="Open menu"
      aria-expanded="false"
      aria-controls="menu"
    >
      <span class="logo-text">Voicetowebsite.com</span>
      <div class="burger-icon">
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </div>
    </button>

    <nav class="menu-box" id="menu" aria-label="Main navigation" role="navigation" hidden>
      <canvas id="three-canvas" aria-hidden="true"></canvas>
      <ul class="nav-links">
        <li class="nav-item"><a href="/" class="nav-link" data-text="HOME">HOME</a></li>
        <li class="nav-item">
          <a href="/how-it-works.html" class="nav-link" data-text="HOW_IT_WORKS">HOW IT WORKS</a>
        </li>
        <li class="nav-item"><a href="/features.html" class="nav-link" data-text="FEATURES">FEATURES</a></li>
        <li class="nav-item"><a href="/pricing.html" class="nav-link" data-text="PRICING">PRICING</a></li>
        <li class="nav-item"><a href="/store.html" class="nav-link" data-text="STORE">STORE</a></li>
        <li class="nav-item"><a href="/appstore-new.html" class="nav-link" data-text="APP_STORE">APP STORE</a></li>
        <li class="nav-item"><a href="/demo.html" class="nav-link" data-text="DEMO">DEMO</a></li>
        <li class="nav-item"><a href="/blog.html" class="nav-link" data-text="BLOG">BLOG</a></li>
        <li class="nav-item"><a href="/contact.html" class="nav-link" data-text="CONTACT">CONTACT</a></li>
        <li class="nav-item"><a href="/livestream.html" class="nav-link" data-text="LIVESTREAM">LIVESTREAM</a></li>
        <li class="nav-item"><a href="/support.html" class="nav-link" data-text="SUPPORT">SUPPORT</a></li>
        <li class="nav-item"><a href="/admin/login.html" class="nav-link" data-text="ADMIN">ADMIN</a></li>
      </ul>
    </nav>

    <script>
      (function () {
        const burger = document.getElementById("burger");
        const menu = document.getElementById("menu");
        const links = document.querySelectorAll(".nav-link");

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSizzle() {
          const bufferSize = audioCtx.sampleRate * 1.5;
          const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
          const noise = audioCtx.createBufferSource();
          noise.buffer = buffer;
          const filter = audioCtx.createBiquadFilter();
          filter.type = "highpass";
          filter.frequency.value = 2000;
          const gain = audioCtx.createGain();
          gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
          noise.connect(filter);
          filter.connect(gain);
          gain.connect(audioCtx.destination);
          noise.start();
        }

        const canvas = document.getElementById("three-canvas");
        if (typeof THREE !== "undefined" && canvas) {
          const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
          const scene = new THREE.Scene();
          const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
          camera.position.z = 5;
          const geometries = [
            new THREE.IcosahedronGeometry(1, 0),
            new THREE.TorusKnotGeometry(0.7, 0.3, 100, 16),
            new THREE.OctahedronGeometry(1, 0),
          ];
          const objects = [];
          for (let i = 0; i < 15; i++) {
            const material = new THREE.MeshPhysicalMaterial({
              color: i % 2 === 0 ? 0xff00ff : 0x00ffff,
              metalness: 0.9,
              roughness: 0.1,
              emissive: i % 2 === 0 ? 0x220022 : 0x002222,
              transparent: true,
              opacity: 0.8,
            });
            const mesh = new THREE.Mesh(geometries[Math.floor(Math.random() * geometries.length)], material);
            mesh.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 5);
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            scene.add(mesh);
            objects.push(mesh);
          }
          scene.add(new THREE.AmbientLight(0xffffff, 0.5));
          const pointLight = new THREE.PointLight(0xffffff, 1);
          pointLight.position.set(5, 5, 5);
          scene.add(pointLight);
          let mouseX = 0,
            mouseY = 0,
            targetX = 0,
            targetY = 0;
          window.addEventListener("mousemove", function (e) {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
          });
          window.addEventListener("deviceorientation", function (e) {
            if (e.beta && e.gamma) {
              targetX = e.gamma / 30;
              targetY = e.beta / 30;
            }
          });
          function animate() {
            requestAnimationFrame(animate);
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;
            objects.forEach(function (obj, i) {
              obj.rotation.x += 0.01;
              obj.rotation.y += 0.01;
              obj.position.x += Math.sin(Date.now() * 0.001 + i) * 0.005;
              obj.position.z = 2 + targetY * 2 + Math.cos(Date.now() * 0.001 + i);
            });
            camera.position.x += (targetX - camera.position.x) * 0.05;
            camera.position.y += (-targetY - camera.position.y) * 0.05;
            camera.lookAt(scene.position);
            renderer.render(scene, camera);
          }
          animate();
          window.addEventListener("resize", function () {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
          });
          renderer.setSize(window.innerWidth, window.innerHeight);
        }

        burger.addEventListener("click", function () {
          const open = menu.classList.toggle("open");
          burger.classList.toggle("active", open);
          burger.setAttribute("aria-expanded", open);
          menu.hidden = !open;
          if (audioCtx.state === "suspended") audioCtx.resume();
        });

        links.forEach(function (link) {
          link.addEventListener("click", function (e) {
            const href = this.getAttribute("href");
            if (!href || href === "#") return;
            e.preventDefault();
            playSizzle();
            this.classList.add("melting");
            setTimeout(function () {
              window.location.href = href;
            }, 800);
          });
        });
      })();
    </script>
  </body>
</html>
